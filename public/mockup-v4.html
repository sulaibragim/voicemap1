<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceMap — Набросок</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f14;
    color: #e4e1ec;
    font-family: 'Manrope', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 390px;
  }

  /* ── Общие стили карточки ── */
  .card {
    background: #1c1b26;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.05);
    aspect-ratio: 1 / 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 16px;
  }

  /* КАРТОЧКА 1 — ЖИВАЯ ЗАПИСЬ */
  .card-live { gap: 12px; }

  .card-live::before {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(123,97,255,0.3) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .rings {
    position: absolute;
    width: 70px; height: 70px;
    display: flex; align-items: center; justify-content: center;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(175,162,255,0.25);
    animation: ripple 2.4s ease-out infinite;
  }

  .ring:nth-child(1) { width: 70px;  height: 70px;  animation-delay: 0s; }
  .ring:nth-child(2) { width: 100px; height: 100px; animation-delay: 0.6s; }
  .ring:nth-child(3) { width: 130px; height: 130px; animation-delay: 1.2s; }

  @keyframes ripple {
    0%   { opacity: 0.6; transform: scale(0.7); }
    100% { opacity: 0;   transform: scale(1.3); }
  }

  .btn-live {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(145deg, #7b61ff, #9f8fff);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(123,97,255,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative; z-index: 1;
    flex-shrink: 0;
  }

  .btn-live:hover  { transform: scale(1.08); box-shadow: 0 10px 32px rgba(123,97,255,0.55); }
  .btn-live:active { transform: scale(0.96); }
  .btn-live svg { width: 26px; height: 26px; fill: white; }

  .card-live .label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8e8a9b;
    position: relative; z-index: 1;
  }

  /* КАРТОЧКА 2 — БЫСТРАЯ ЗАМЕТКА */
  .card-note { cursor: pointer; }

  .note-default {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%; height: 100%;
    transition: opacity 0.2s, transform 0.2s;
    position: absolute;
  }

  .card-note.open .note-default {
    opacity: 0;
    transform: scale(0.8);
    pointer-events: none;
  }

  .btn-note {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #252330;
    border: 2px solid rgba(175,162,255,0.25);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }

  .btn-note:hover  { transform: scale(1.06); border-color: rgba(175,162,255,0.5); }

  .card-note .label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8e8a9b;
  }

  /* 4 варианта */
  .note-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%; height: 100%;
    padding: 4px;
    opacity: 0;
    pointer-events: none;
    position: absolute;
    transition: opacity 0.2s, transform 0.2s;
    transform: scale(0.85);
  }

  .card-note.open .note-choices {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }

  .choice {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-radius: 18px;
    cursor: pointer;
    transition: transform 0.12s, filter 0.12s;
    padding: 8px 4px;
  }

  .choice:hover  { transform: scale(1.06); filter: brightness(1.2); }
  .choice:active { transform: scale(0.96); }

  .choice.idea     { background: rgba(123,97,255,0.15); }
  .choice.task     { background: rgba(79,195,127,0.13); }
  .choice.thought  { background: rgba(255,183,77,0.13); }
  .choice.reminder { background: rgba(239,83,80,0.13);  }

  .choice-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .choice.idea     .choice-icon { background: rgba(123,97,255,0.25); }
  .choice.task     .choice-icon { background: rgba(79,195,127,0.22); }
  .choice.thought  .choice-icon { background: rgba(255,183,77,0.22); }
  .choice.reminder .choice-icon { background: rgba(239,83,80,0.22);  }

  .choice-icon svg { width: 15px; height: 15px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .choice.idea     .choice-icon svg { stroke: #afa2ff; }
  .choice.task     .choice-icon svg { stroke: #4fc37f; }
  .choice.thought  .choice-icon svg { stroke: #ffb74d; }
  .choice.reminder .choice-icon svg { stroke: #f47d7b; }

  .choice-name {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .choice.idea     .choice-name { color: #c4baff; }
  .choice.task     .choice-name { color: #81c99a; }
  .choice.thought  .choice-name { color: #ffc87a; }
  .choice.reminder .choice-name { color: #f47d7b; }
</style>
</head>
<body>

<div class="row">

  <!-- Карточка 1: Живая запись -->
  <div class="card card-live">
    <div class="rings">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <button class="btn-live">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
        <line x1="12" y1="19" x2="12" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="23" x2="16" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <span class="label">Запись</span>
  </div>

  <!-- Карточка 2: Быстрая заметка -->
  <div class="card card-note" id="noteCard">

    <div class="note-default">
      <div class="btn-note">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#afa2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <span class="label">Заметка</span>
    </div>

    <div class="note-choices">
      <div class="choice idea">
        <div class="choice-icon">
          <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6L15 17H9l-.7-2C6.3 13.7 5 11.5 5 9a7 7 0 0 1 7-7z"/></svg>
        </div>
        <span class="choice-name">Идея</span>
      </div>
      <div class="choice task">
        <div class="choice-icon">
          <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <span class="choice-name">Задача</span>
      </div>
      <div class="choice thought">
        <div class="choice-icon">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="9" r="4"/><circle cx="17" cy="15" r="3"/><circle cx="6.5" cy="17" r="2"/></svg>
        </div>
        <span class="choice-name">Мысль</span>
      </div>
      <div class="choice reminder">
        <div class="choice-icon">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <span class="choice-name">Напомн.</span>
      </div>
    </div>

  </div>

</div>

<script>
  const card = document.getElementById('noteCard');
  card.addEventListener('click', function(e) {
    if (card.classList.contains('open') && e.target.closest('.choice')) return;
    card.classList.toggle('open');
  });
</script>

</body>
</html>
