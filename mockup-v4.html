<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceMap — Вариант 4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f14;
    color: #e4e1ec;
    font-family: 'Manrope', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 16px;
    min-height: 100vh;
  }

  .label-top {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8e8a9b;
    align-self: flex-start;
    margin-bottom: -8px;
  }

  /* ── CARD 1: Длинная запись ── */
  .record-card {
    width: 100%;
    max-width: 390px;
    background: #1c1b26;
    border-radius: 28px;
    padding: 24px 24px 20px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(175,162,255,0.08);
  }

  /* Градиентный glow */
  .record-card::before {
    content: '';
    position: absolute;
    right: -40px;
    top: -40px;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(123,97,255,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .record-card-header {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .record-card-header .chip {
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #afa2ff;
    background: rgba(175,162,255,0.1);
    border-radius: 100px;
    padding: 3px 10px;
    width: fit-content;
  }

  .record-card-header h2 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
    font-family: 'Epilogue', system-ui, sans-serif;
  }

  /* SVG волна */
  .waveform {
    width: 100%;
    height: 52px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .waveform .bar {
    flex: 1;
    border-radius: 100px;
    background: rgba(175,162,255,0.18);
    animation: pulse 1.4s ease-in-out infinite;
  }

  /* Разная высота баров */
  .waveform .bar:nth-child(1)  { height: 12px; animation-delay: 0s; }
  .waveform .bar:nth-child(2)  { height: 28px; animation-delay: 0.1s; }
  .waveform .bar:nth-child(3)  { height: 40px; animation-delay: 0.2s; }
  .waveform .bar:nth-child(4)  { height: 22px; animation-delay: 0.3s; }
  .waveform .bar:nth-child(5)  { height: 48px; animation-delay: 0.4s; }
  .waveform .bar:nth-child(6)  { height: 32px; animation-delay: 0.5s; }
  .waveform .bar:nth-child(7)  { height: 52px; animation-delay: 0.15s; }
  .waveform .bar:nth-child(8)  { height: 38px; animation-delay: 0.25s; }
  .waveform .bar:nth-child(9)  { height: 20px; animation-delay: 0.35s; }
  .waveform .bar:nth-child(10) { height: 44px; animation-delay: 0.45s; }
  .waveform .bar:nth-child(11) { height: 30px; animation-delay: 0.55s; }
  .waveform .bar:nth-child(12) { height: 16px; animation-delay: 0.05s; }
  .waveform .bar:nth-child(13) { height: 36px; animation-delay: 0.65s; }
  .waveform .bar:nth-child(14) { height: 52px; animation-delay: 0.2s; }
  .waveform .bar:nth-child(15) { height: 24px; animation-delay: 0.4s; }
  .waveform .bar:nth-child(16) { height: 42px; animation-delay: 0.6s; }
  .waveform .bar:nth-child(17) { height: 18px; animation-delay: 0.1s; }
  .waveform .bar:nth-child(18) { height: 34px; animation-delay: 0.3s; }
  .waveform .bar:nth-child(19) { height: 10px; animation-delay: 0.5s; }
  .waveform .bar:nth-child(20) { height: 26px; animation-delay: 0.7s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.18; transform: scaleY(0.7); }
    50%       { opacity: 0.55; transform: scaleY(1); }
  }

  /* Кнопка записи */
  .record-btn {
    width: 100%;
    background: linear-gradient(135deg, #7b61ff 0%, #9f8fff 100%);
    border: none;
    border-radius: 18px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 32px rgba(123,97,255,0.35);
  }

  .record-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(123,97,255,0.45); }
  .record-btn:active { transform: scale(0.98); }

  .record-btn-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .record-btn .mic-icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .record-btn .mic-icon svg { width: 20px; height: 20px; fill: white; }

  .record-btn-text { text-align: left; }
  .record-btn-text .main { font-size: 15px; font-weight: 800; color: white; }
  .record-btn-text .sub  { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 1px; }

  .record-btn .arrow {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .record-btn .arrow svg { width: 16px; height: 16px; stroke: white; fill: none; }

  /* ── CARD 2: Быстрая заметка ── */
  .note-card {
    width: 100%;
    max-width: 390px;
    background: #1c1b26;
    border-radius: 28px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .note-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .note-card-header h3 {
    font-size: 13px;
    font-weight: 800;
    color: #8e8a9b;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .note-card-header .badge {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: rgba(175,162,255,0.12);
    color: #afa2ff;
    border-radius: 100px;
    padding: 3px 10px;
  }

  /* Тип-полоски */
  .note-strips {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .note-strip {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.12s, filter 0.12s;
    border: 1px solid transparent;
  }

  .note-strip:hover { transform: translateX(4px); filter: brightness(1.15); }
  .note-strip:active { transform: scale(0.98); }

  .note-strip.idea        { background: rgba(123,97,255,0.12); border-color: rgba(123,97,255,0.2); }
  .note-strip.task        { background: rgba(79,195,127,0.10); border-color: rgba(79,195,127,0.2); }
  .note-strip.thought     { background: rgba(255,183,77,0.10); border-color: rgba(255,183,77,0.2); }
  .note-strip.reminder    { background: rgba(239,83,80,0.10);  border-color: rgba(239,83,80,0.2); }

  .strip-icon {
    width: 34px; height: 34px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .note-strip.idea     .strip-icon { background: rgba(123,97,255,0.2); }
  .note-strip.task     .strip-icon { background: rgba(79,195,127,0.2); }
  .note-strip.thought  .strip-icon { background: rgba(255,183,77,0.2); }
  .note-strip.reminder .strip-icon { background: rgba(239,83,80,0.2); }

  .strip-icon svg { width: 16px; height: 16px; }
  .note-strip.idea     .strip-icon svg { stroke: #afa2ff; fill: none; }
  .note-strip.task     .strip-icon svg { stroke: #4fc37f; fill: none; }
  .note-strip.thought  .strip-icon svg { stroke: #ffb74d; fill: none; }
  .note-strip.reminder .strip-icon svg { stroke: #ef5350; fill: none; }

  .strip-text { flex: 1; }
  .strip-text .name { font-size: 14px; font-weight: 700; }
  .strip-text .hint { font-size: 10px; color: #8e8a9b; margin-top: 1px; }

  .note-strip.idea     .strip-text .name { color: #c4baff; }
  .note-strip.task     .strip-text .name { color: #81c99a; }
  .note-strip.thought  .strip-text .name { color: #ffc87a; }
  .note-strip.reminder .strip-text .name { color: #f47d7b; }

  .strip-arrow { color: #8e8a9b; }
  .strip-arrow svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }
</style>
</head>
<body>

<div class="label-top">Вариант 4 — набросок</div>

<!-- Карточка 1: Длинная запись -->
<div class="record-card">
  <div class="record-card-header">
    <span class="chip">Живая сессия</span>
    <h2>ГОТОВЫ К<br>ЗАПИСИ?</h2>
  </div>

  <!-- Волна -->
  <div class="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>

  <!-- Кнопка -->
  <button class="record-btn">
    <div class="record-btn-left">
      <div class="mic-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="record-btn-text">
        <div class="main">Начать запись</div>
        <div class="sub">Умное архивирование + AI</div>
      </div>
    </div>
    <div class="arrow">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </button>
</div>

<!-- Карточка 2: Быстрая заметка -->
<div class="note-card">
  <div class="note-card-header">
    <h3>Быстрая заметка</h3>
    <span class="badge">Тап → старт</span>
  </div>

  <div class="note-strips">

    <div class="note-strip idea">
      <div class="strip-icon">
        <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6L15 17H9l-.7-2C6.3 13.7 5 11.5 5 9a7 7 0 0 1 7-7z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="strip-text">
        <div class="name">Идея</div>
        <div class="hint">Запишу мысль пока не забыл</div>
      </div>
      <div class="strip-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <div class="note-strip task">
      <div class="strip-icon">
        <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="strip-text">
        <div class="name">Задача</div>
        <div class="hint">Добавить в список дел</div>
      </div>
      <div class="strip-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <div class="note-strip thought">
      <div class="strip-icon">
        <svg viewBox="0 0 24 24"><circle cx="9.5" cy="9.5" r="5.5" stroke-width="1.8"/><circle cx="17.5" cy="15.5" r="3.5" stroke-width="1.8"/><circle cx="6.5" cy="17.5" r="2.5" stroke-width="1.8"/></svg>
      </div>
      <div class="strip-text">
        <div class="name">Мысль</div>
        <div class="hint">Размышление для заметок</div>
      </div>
      <div class="strip-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <div class="note-strip reminder">
      <div class="strip-icon">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="strip-text">
        <div class="name">Напоминание</div>
        <div class="hint">Скажу когда и о чём</div>
      </div>
      <div class="strip-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

  </div>
</div>

</body>
</html>
